<script>
async function startCRM() {
  const crmEl = document.getElementById('view-crm');
  if (!crmEl) return; // Safety check for "innerHTML of null"

  try {
    const res = await fetch('/api/crm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'load' })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    let html = '<div class="crm-section-hd">Active Leads</div>';
    data.leads.forEach(l => {
      html += `
        <div class="crm-card">
          <div class="crm-card-name">${l.name}</div>
          <div class="crm-card-meta">${l.company}</div>
          <span class="crm-badge crm-status-${l.status.toLowerCase()}">${l.status}</span>
        </div>`;
    });
    crmEl.innerHTML = html;

  } catch (err) {
    console.error("Load failed:", err);
    crmEl.innerHTML = `<div style="padding:20px; color:red;">Failed: ${err.message}</div>`;
  }
}

// Fire only when page is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startCRM);
} else {
  startCRM();
}
</script>
