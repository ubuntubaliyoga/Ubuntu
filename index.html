<script>
async function loadCRM() {
  const container = document.getElementById('view-crm');
  const debugLog = document.getElementById('debug-log');
  
  if (!container) return; // Guard for "innerHTML of null"

  try {
    const res = await fetch('/api/crm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'load' })
    });

    // Check if response is actually JSON
    const contentType = res.headers.get("content-type");
    if (!contentType || !contentType.includes("application/json")) {
      const raw = await res.text();
      throw new Error(`Server sent non-JSON: ${raw.substring(0, 30)}`);
    }

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    container.innerHTML = data.leads.map(l => `
      <div class="crm-card">
        <div class="crm-card-name">${l.name}</div>
        <div class="crm-badge crm-status-${l.status.toLowerCase()}">${l.status}</div>
      </div>
    `).join('');

  } catch (e) {
    console.error("CRM Error:", e);
    if (debugLog) debugLog.innerHTML = `<div style="color:red">Error: ${e.message}</div>`;
    container.innerHTML = `<p style="padding:20px; color:#8B3A2E;">Failed to load CRM data. Check Debug panel.</p>`;
  }
}

// Run after page load
document.addEventListener('DOMContentLoaded', loadCRM);
</script>
